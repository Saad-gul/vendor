name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketverse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w packages/shared
      - name: Generate Prisma client
        run: npm run db:generate -w apps/api
      - name: Run API migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketverse_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
        run: npm run db:deploy -w apps/api
      - name: Lint and typecheck API
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketverse_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
        run: npm run lint -w apps/api
      - name: Run API tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketverse_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
        run: npm run test -w apps/api
      - name: Lint and typecheck Web
        run: |
          npm run lint -w apps/web
          npm run typecheck -w apps/web
      - name: Build Web
        run: npm run build -w apps/web
      - name: Build API
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketverse_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
        run: npm run build -w apps/api
